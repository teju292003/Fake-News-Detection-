<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Fake News Detector</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; padding-top: 50px; }
        .container { max-width: 800px; }
        .result-box { padding: 20px; border-radius: 8px; margin-top: 20px; font-weight: bold; text-align: center; font-size: 1.5rem;}
        .real { background-color: #d1e7dd; color: #0f5132; border: 1px solid #badbcc; }
        .fake { background-color: #f8d7da; color: #842029; border: 1px solid #f5c2c7; }
    </style>
</head>
<body>

<div class="container">
    <div class="card shadow-sm">
        <div class="card-body">
            <h2 class="card-title text-center mb-4">Fake News Detector</h2>
            
            {% if not model_loaded %}
                <div class="alert alert-danger">Warning: ML models not found in the detector folder!</div>
            {% endif %}

            <form method="POST">
                {% csrf_token %}
                <div class="mb-3">
                    <label for="news_text" class="form-label">Paste the news article or headline here:</label>
                    <textarea class="form-control" id="news_text" name="news_text" rows="6" required>{{ news_text }}</textarea>
                </div>
                <div class="d-grid gap-2">
                    <button type="submit" class="btn btn-dark btn-lg" {% if not model_loaded %}disabled{% endif %}>Analyze Text</button>
                </div>
            </form>

            {% if prediction %}
                {% if prediction == "REAL NEWS" %}
                    <div class="result-box real">Result: ✅ {{ prediction }}</div>
                {% else %}
                    <div class="result-box fake">Result: 🚨 {{ prediction }}</div>
                {% endif %}
            {% endif %}
        </div>
    </div>
</div>

</body>
</html>
